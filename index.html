<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📖English-Hindi Dictionary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            padding: 24px 20px 32px;
            transition: all 0.3s ease;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 0.85rem;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 12px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        #wordInput {
            flex: 1;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            transition: all 0.3s;
            font-family: inherit;
            min-width: 0;
        }

        #wordInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #searchBtn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        #searchBtn:active {
            transform: scale(0.96);
        }

        @media (hover: hover) {
            #searchBtn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }
        }

        .result {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            background: #f8f9fa;
            padding: 16px;
            border-radius: 16px;
        }

        .word-info {
            flex: 1;
        }

        .word-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        .phonetic {
            color: #888;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .speaker-btn {
            background: white;
            border: 2px solid #667eea;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 60px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            font-weight: 500;
            min-width: 80px;
            justify-content: center;
        }

        .speaker-btn:active {
            transform: scale(0.95);
        }

        .definition-card {
            background: white;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .part-of-speech {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1rem;
            display: inline-block;
            background: #e8eaff;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .definition {
            color: #333;
            margin-bottom: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .hindi-meaning {
            background: #fff3e0;
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0 8px;
            border-left: 4px solid #ff9800;
        }

        .hindi-label {
            font-weight: bold;
            color: #e67e22;
            font-size: 0.85rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hindi-text {
            color: #2c3e50;
            font-size: 1rem;
            line-height: 1.5;
            word-break: break-word;
            font-family: 'Noto Sans', 'Segoe UI', system-ui;
        }

        .example {
            color: #666;
            font-style: italic;
            margin-top: 10px;
            padding-left: 12px;
            border-left: 3px solid #ddd;
            font-size: 0.9rem;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 14px;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease;
            margin: 16px 0;
        }

        .loading {
            text-align: center;
            display: none;
            margin: 32px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-note {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #1976d2;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            color: #aaa;
            font-size: 0.7rem;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }

        /* Mobile specific optimizations */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            
            .container {
                padding: 18px 16px 24px;
            }
            
            h1 {
                font-size: 1.4rem;
            }
            
            .word-title {
                font-size: 1.4rem;
            }
            
            .speaker-btn {
                padding: 10px 14px;
                font-size: 1.3rem;
                min-width: 70px;
            }
            
            .definition-card {
                padding: 14px;
            }
            
            .search-box {
                gap: 8px;
            }
            
            #searchBtn {
                padding: 12px 18px;
                font-size: 14px;
            }
            
            .hindi-text {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .word-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .speaker-btn {
                width: 100%;
                justify-content: center;
            }
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>📖</span> 
            <span>English-Hindi Dictionary</span>
            <span>🇮🇳</span>
        </h1>
        <div class="subtitle">English-Hindi Dictionary with Pronunciation</div>

        <div class="search-box">
            <input type="text" id="wordInput" placeholder="Enter English word..." autocomplete="off">
            <button id="searchBtn">🔍 Search</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching meanings...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="word-header">
                <div class="word-info">
                    <div class="word-title" id="wordTitle"></div>
                    <div class="phonetic" id="phonetic"></div>
                </div>
                <button class="speaker-btn" id="speakerBtn">
                    🔊 <span style="font-size: 0.9rem;">Listen</span>
                </button>
            </div>
            <div id="definitionsList"></div>
        </div>

        <div class="info-note">
            💡 Hindi meanings provided by MyMemory API | Tap speaker to hear pronunciation
        </div>

        <footer>Powered by Free Dictionary API & MyMemory Translate</footer>
    </div>

    <script>
        const wordInput = document.getElementById('wordInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const loadingDiv = document.getElementById('loading');
        const wordTitle = document.getElementById('wordTitle');
        const phoneticSpan = document.getElementById('phonetic');
        const definitionsList = document.getElementById('definitionsList');
        const speakerBtn = document.getElementById('speakerBtn');

        let currentWord = '';

        // Hindi translation function using MyMemory API (free, no API key)
        async function getHindiTranslation(word, context = '') {
            try {
                // Use the word itself as context for better translation
                const textToTranslate = context || word;
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(textToTranslate)}&langpair=en|hi`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.responseData && data.responseData.translatedText) {
                    let translated = data.responseData.translatedText;
                    // Remove any extra HTML or weird characters
                    translated = translated.replace(/&#39;/g, "'").replace(/&quot;/g, '"');
                    return translated;
                }
                return null;
            } catch (error) {
                console.error('Translation error:', error);
                return null;
            }
        }

        // Search word definition
        async function searchWord() {
            const word = wordInput.value.trim().toLowerCase();
            if (!word) {
                showError('कृपया एक शब्द दर्ज करें | Please enter a word!');
                return;
            }

            currentWord = word;
            showLoading();
            hideResult();
            hideError();

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`"${word}" not found. | "${word}" नहीं मिला।`);
                    }
                    throw new Error('Something went wrong. | कुछ गलत हो गया।');
                }

                const data = await response.json();
                await displayResultWithHindi(data);
                hideError();
            } catch (error) {
                showError(error.message);
            } finally {
                hideLoading();
            }
        }

        async function displayResultWithHindi(data) {
            if (!data || data.length === 0) {
                showError('No definitions found. | कोई परिभाषा नहीं मिली।');
                return;
            }

            const wordData = data[0];
            wordTitle.textContent = wordData.word.charAt(0).toUpperCase() + wordData.word.slice(1);
            
            // Get phonetic
            let phonetic = wordData.phonetic || '';
            if (!phonetic && wordData.phonetics) {
                const textPhonetic = wordData.phonetics.find(p => p.text);
                if (textPhonetic) phonetic = textPhonetic.text;
            }
            phoneticSpan.textContent = phonetic ? `/${phonetic}/` : '';
            
            // Build definitions list with Hindi translations
            definitionsList.innerHTML = '';
            
            // Show loading indicator for translations
            const translationPromises = [];
            
            for (const meaning of wordData.meanings) {
                const partOfSpeech = meaning.partOfSpeech;
                
                for (const def of meaning.definitions) {
                    const definitionText = def.definition;
                    
                    // Create card container
                    const card = document.createElement('div');
                    card.className = 'definition-card';
                    
                    // Add part of speech
                    const posSpan = document.createElement('div');
                    posSpan.className = 'part-of-speech';
                    posSpan.textContent = partOfSpeech;
                    card.appendChild(posSpan);
                    
                    // Add English definition
                    const defText = document.createElement('div');
                    defText.className = 'definition';
                    defText.textContent = definitionText;
                    card.appendChild(defText);
                    
                    // Create container for Hindi meaning (will update later)
                    const hindiContainer = document.createElement('div');
                    hindiContainer.className = 'hindi-meaning';
                    hindiContainer.innerHTML = `
                        <div class="hindi-label">
                            <span>🇮🇳</span> हिंदी अर्थ (Hindi Meaning):
                        </div>
                        <div class="hindi-text" id="hindi-${Date.now()}-${Math.random()}">
                            ⏳ Loading translation...
                        </div>
                    `;
                    card.appendChild(hindiContainer);
                    
                    // Get Hindi translation for this definition
                    const hindiTextSpan = hindiContainer.querySelector('.hindi-text');
                    const translatePromise = getHindiTranslation(currentWord, definitionText).then(hindiText => {
                        if (hindiText && hindiText !== currentWord) {
                            hindiTextSpan.textContent = hindiText;
                        } else {
                            hindiTextSpan.textContent = '⚠️ Translation not available | अनुवाद उपलब्ध नहीं है';
                        }
                    }).catch(() => {
                        hindiTextSpan.textContent = '⚠️ Translation failed | अनुवाद विफल';
                    });
                    
                    translationPromises.push(translatePromise);
                    
                    // Add example if exists
                    if (def.example) {
                        const exampleText = document.createElement('div');
                        exampleText.className = 'example';
                        exampleText.textContent = `📌 "${def.example}"`;
                        card.appendChild(exampleText);
                        
                        // Also translate example
                        const exampleHindiContainer = document.createElement('div');
                        exampleHindiContainer.className = 'hindi-meaning';
                        exampleHindiContainer.style.marginTop = '8px';
                        exampleHindiContainer.style.background = '#f0f7ff';
                        exampleHindiContainer.innerHTML = `
                            <div class="hindi-label">
                                <span>📝</span> उदाहरण हिंदी (Example in Hindi):
                            </div>
                            <div class="hindi-text" id="example-${Date.now()}-${Math.random()}">
                                ⏳ Translating example...
                            </div>
                        `;
                        card.appendChild(exampleHindiContainer);
                        
                        const exampleHindiSpan = exampleHindiContainer.querySelector('.hindi-text');
                        const examplePromise = getHindiTranslation('', def.example).then(hindiExample => {
                            if (hindiExample && hindiExample !== def.example) {
                                exampleHindiSpan.textContent = hindiExample;
                            } else {
                                exampleHindiSpan.textContent = 'Example translation unavailable';
                            }
                        }).catch(() => {
                            exampleHindiSpan.textContent = 'Translation failed';
                        });
                        
                        translationPromises.push(examplePromise);
                    }
                    
                    definitionsList.appendChild(card);
                }
            }
            
            // Wait for all translations to complete (optional, but improves UX)
            Promise.all(translationPromises).then(() => {
                console.log('All translations loaded');
            });
            
            showResult();
            
            // Setup speaker button
            speakerBtn.onclick = () => {
                speakWord(currentWord);
            };
        }
        
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                
                // Try to get a clear voice
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(voice => voice.lang === 'en-US' && voice.name.includes('Google'));
                if (preferredVoice) utterance.voice = preferredVoice;
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert('Your browser does not support speech synthesis.');
            }
        }
        
        // Preload voices
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }
        
        function showLoading() {
            loadingDiv.style.display = 'block';
        }
        
        function hideLoading() {
            loadingDiv.style.display = 'none';
        }
        
        function showResult() {
            resultDiv.style.display = 'block';
        }
        
        function hideResult() {
            resultDiv.style.display = 'none';
        }
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                if (errorDiv.style.display === 'block') {
                    errorDiv.style.opacity = '0';
                    setTimeout(() => {
                        if (errorDiv.style.display === 'block') {
                            errorDiv.style.display = 'none';
                            errorDiv.style.opacity = '1';
                        }
                    }, 3000);
                }
            }, 5000);
        }
        
        function hideError() {
            errorDiv.style.display = 'none';
        }
        
        // Event listeners
        searchBtn.addEventListener('click', searchWord);
        wordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWord();
        });
        
        // Auto-focus and example search
        wordInput.focus();
        
        // Demo word on load
        setTimeout(() => {
            wordInput.value = 'happiness';
            searchWord();
        }, 500);
    </script>
</body>
</html>
